<!DOCTYPE html>
<html>
<head>
  <title>Zone Finder - Colorado</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      font-family: Arial;
      margin:0;
      padding:0;
      display:flex;
      height:100vh;
    }

    #sidebar {
      width: 320px;
      overflow-y:auto;
      padding:15px;
      border-right:1px solid #aaa;
      background:#f4f6f8;
      box-shadow: 2px 0px 5px rgba(0,0,0,0.1);
      position: relative; /* ✅ FIXED */
    }

    #map {
      flex:1;
      border-left:1px solid #ccc;
    }

    input {
      width: 90%;
      padding:7px;
      margin-bottom:5px;
      border-radius:4px;
      border:1px solid #ccc;
    }

    button {
      padding:6px 10px;
      border-radius:4px;
      border:none;
      background:#007bff;
      color:#fff;
      cursor:pointer;
    }

    button:hover {
      background:#0056b3;
    }

    .location-card {
      margin-bottom:12px;
      padding:10px;
      border-radius:6px;
      background:#fff;
      box-shadow: 0px 1px 3px rgba(0,0,0,0.1);
    }

    #suggestions {
      background:#fff;
      border:1px solid #ccc;
      position:absolute;
      z-index:1000;
      width: 280px;
      max-height:150px;
      overflow-y:auto;
      border-radius:4px;
    }

    .suggestion-item {
      padding:5px;
      cursor:pointer;
    }

    .suggestion-item:hover,
    .suggestion-active {
      background:#007bff;
      color:#fff;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <h2>Find Your Zone</h2>
  <input id="address" placeholder="Enter your address" autocomplete="off" />
  <div id="suggestions"></div>
  <button onclick="useSelectedSuggestion()">Search</button>
  <div id="result"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf/turf.min.js"></script>
<script src="data.js"></script>

<script>
// ==========================
// MAP SETUP
// ==========================
const map = L.map('map').setView([39.0, -105.5], 7);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  subdomains:'abcd',
  attribution: '&copy; OpenStreetMap & CARTO'
}).addTo(map);

let userMarker;
let locationMarkers = [];
let highlightedZones = [];

// ==========================
// SAFE WKT PARSERS
// ==========================
function parsePoint(wkt) {
  const match = wkt.match(/\(([^)]+)\)/);
  if (!match) return null;

  let [a, b] = match[1].split(/[ ,]+/).map(Number);

  if (Math.abs(a) <= 90 && Math.abs(b) > 90) {
    [a, b] = [b, a];
  }

  return turf.point([a, b]);
}

function parsePolygon(wkt) {
  const match = wkt.match(/\(\(([^)]+)\)\)/);
  if (!match) return null;

  let coords = match[1]
    .split(",")
    .map(pair => pair.trim().split(/[ ]+/).map(Number));

  coords = coords.map(([a, b]) => {
    if (Math.abs(a) <= 90 && Math.abs(b) > 90) {
      return [b, a];
    }
    return [a, b];
  });

  const first = coords[0];
  const last = coords[coords.length - 1];
  if (first[0] !== last[0] || first[1] !== last[1]) {
    coords.push(first);
  }

  return turf.polygon([coords]);
}

// ==========================
// DRAW ZONES
// ==========================
ZONES.forEach(zone => {
  const poly = parsePolygon(zone.polygon);
  if (!poly) return;

  zone.polygonObj = poly;

  const layer = L.geoJSON(poly, {
    color: 'blue',
    weight: 2,
    fillOpacity: 0.05
  }).addTo(map);

  zone.layer = layer;
});

// ==========================
// CLEANUP
// ==========================
function clearMarkers() {
  if(userMarker) map.removeLayer(userMarker);

  locationMarkers.forEach(m => map.removeLayer(m));
  locationMarkers = [];

  highlightedZones.forEach(h => h.setStyle({color:'blue', fillOpacity:0.05}));
  highlightedZones = [];
}

// ==========================
// AUTOCOMPLETE (FIXED)
// ==========================
const addressInput = document.getElementById("address");
const suggestionsDiv = document.getElementById("suggestions");

let selectedSuggestion = null;
let debounceTimer;

addressInput.addEventListener("keyup", function() {
  clearTimeout(debounceTimer);

  debounceTimer = setTimeout(async () => {
    const query = addressInput.value.trim();
    if(!query) {
      suggestionsDiv.innerHTML="";
      return;
    }

    try {
      const res = await fetch(
        `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`,
        { headers: { "Accept": "application/json" } }
      );

      const data = await res.json();
      console.log("Geocode results:", data);

      suggestionsDiv.innerHTML = "";

      data.forEach(item => {
        const div = document.createElement("div");
        div.className="suggestion-item";
        div.innerText = item.display_name;

        div.onclick = () => {
          addressInput.value = item.display_name;
          selectedSuggestion = item;
          suggestionsDiv.innerHTML = "";
        };

        suggestionsDiv.appendChild(div);
      });

    } catch (err) {
      console.error("Geocoding error:", err);
    }

  }, 300);
});

// Hide dropdown
document.addEventListener("click", function(e){
  if(!addressInput.contains(e.target) && !suggestionsDiv.contains(e.target)){
    suggestionsDiv.innerHTML="";
  }
});

// ==========================
// SEARCH BUTTON
// ==========================
function useSelectedSuggestion(){
  if(!selectedSuggestion){
    const first = suggestionsDiv.querySelector(".suggestion-item");
    if(first){
      first.click();
    } else {
      alert("No valid address found.");
      return;
    }
  }

  const lat = parseFloat(selectedSuggestion.lat);
  const lon = parseFloat(selectedSuggestion.lon);

  runSearch(lat, lon);
}

// ==========================
// MAIN SEARCH
// ==========================
function runSearch(lat, lon){
  clearMarkers();

  const userPoint = turf.point([lon, lat]);

  userMarker = L.marker([lat, lon])
    .addTo(map)
    .bindPopup("You are here")
    .openPopup();

  let matchedZones = [];

  ZONES.forEach(zone => {
    if (!zone.polygonObj) return;

    if(turf.booleanPointInPolygon(userPoint, zone.polygonObj)){
      matchedZones.push(zone);

      zone.layer.setStyle({
        color:'green',
        fillOpacity:0.2
      });

      highlightedZones.push(zone.layer);
    }
  });

  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "";

  if(matchedZones.length === 0){
    resultDiv.innerText = "❌ No matching zones found";
    map.setView([lat, lon], 10);
    return;
  }

  resultDiv.innerHTML = `<p>✅ Found ${matchedZones.length} matching zone(s)</p>`;

  matchedZones.forEach(zone => {
    const loc = zone.location;
    const pt = parsePoint(loc.point);
    if (!pt) return;

    const [lon2, lat2] = pt.geometry.coordinates;

    const marker = L.marker([lat2, lon2]).addTo(map);
    marker.bindPopup(`<b>${loc.name}</b><br>${loc.address}`);
    locationMarkers.push(marker);

    const div = document.createElement("div");
    div.className = "location-card";
    div.innerHTML = `
      <b>${loc.name}</b><br>
      ${loc.address}<br>
      Grades Served: ${loc.grades}<br>
      Zone: ${zone.name}<br>
      <a href="https://www.google.com/maps/dir/?api=1&origin=${lat},${lon}&destination=${lat2},${lon2}" target="_blank">
        Get Directions
      </a>
    `;
    resultDiv.appendChild(div);
  });

  map.fitBounds(locationMarkers.map(m=>m.getLatLng()));
}
</script>

</body>
</html>
