<!DOCTYPE html>
<html>
<head>
  <title>Zone Finder - Colorado</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body { font-family: Arial; margin:0; padding:0; display:flex; height:100vh; }

    #sidebar {
      width: 320px;
      overflow-y:auto;
      padding:15px;
      border-right:1px solid #aaa;
      background:#f4f6f8;
      box-shadow: 2px 0px 5px rgba(0,0,0,0.1);
      position: relative;
    }

    #map { flex:1; }

    input {
      width: 90%;
      padding:7px;
      margin-bottom:5px;
      border-radius:4px;
      border:1px solid #ccc;
    }

    button {
      padding:6px 10px;
      border-radius:4px;
      border:none;
      background:#007bff;
      color:#fff;
      cursor:pointer;
    }

    button:hover { background:#0056b3; }

    .location-card {
      margin-bottom:12px;
      padding:10px;
      border-radius:6px;
      background:#fff;
      box-shadow: 0px 1px 3px rgba(0,0,0,0.1);
    }

    #suggestions {
      background:#fff;
      border:1px solid #ccc;
      position:absolute;
      z-index:1000;
      width: 280px;
      max-height:150px;
      overflow-y:auto;
      border-radius:4px;
    }

    .suggestion-item { padding:5px; cursor:pointer; }
    .suggestion-item:hover { background:#007bff; color:#fff; }
  </style>
</head>

<body>

<div id="sidebar">
  <h2>Find Your Zone</h2>
  <input id="address" placeholder="Enter your address" autocomplete="off" />
  <div id="suggestions"></div>
  <button onclick="useSelectedSuggestion()">Search</button>
  <div id="result"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf/turf.min.js"></script>
<script src="data.js"></script>

<script>
// ================= MAP =================
const map = L.map('map').setView([39.0, -105.5], 7);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  subdomains:'abcd'
}).addTo(map);

let userMarker;
let locationMarkers = [];
let highlightedZones = [];
let currentLat = null;
let currentLon = null;

// ================= PARSERS =================
function parsePoint(wkt) {
  const match = wkt.match(/\(([^)]+)\)/);
  if (!match) return null;

  let [a, b] = match[1].split(/[ ,]+/).map(Number);

  if (Math.abs(a) <= 90 && Math.abs(b) > 90) {
    [a, b] = [b, a];
  }

  return turf.point([a, b]);
}

function parsePolygon(wkt) {
  const match = wkt.match(/\(\(([^)]+)\)\)/);
  if (!match) return null;

  let coords = match[1]
    .split(",")
    .map(p => p.trim().split(" ").map(Number));

  coords = coords.map(([a, b]) => {
    if (Math.abs(a) <= 90 && Math.abs(b) > 90) return [b, a];
    return [a, b];
  });

  if (coords[0][0] !== coords.at(-1)[0] || coords[0][1] !== coords.at(-1)[1]) {
    coords.push(coords[0]);
  }

  return turf.polygon([coords]);
}

// ================= DRAW ZONES =================
ZONES.forEach(zone => {
  const poly = parsePolygon(zone.polygon);
  if (!poly) return;

  zone.polygonObj = poly;

  zone.layer = L.geoJSON(poly, {
    color:'blue',
    weight:2,
    fillOpacity:0.05
  }).addTo(map);
});

// ================= CLEANUP =================
function clearMarkers() {
  if(userMarker) map.removeLayer(userMarker);
  locationMarkers.forEach(m => map.removeLayer(m));
  locationMarkers = [];
  highlightedZones.forEach(z => z.setStyle({color:'blue', fillOpacity:0.05}));
  highlightedZones = [];
}

// ================= AUTOCOMPLETE =================
const input = document.getElementById("address");
const suggestionsDiv = document.getElementById("suggestions");
let selectedSuggestion = null;
let debounce;

input.addEventListener("keyup", () => {
  clearTimeout(debounce);

  debounce = setTimeout(async () => {
    const q = input.value.trim();
    if(!q) return suggestionsDiv.innerHTML="";

    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=5`
    );

    const data = await res.json();
    suggestionsDiv.innerHTML = "";

    data.forEach(item => {
      const div = document.createElement("div");
      div.className="suggestion-item";
      div.innerText = item.display_name;

      div.onclick = () => {
        input.value = item.display_name;
        selectedSuggestion = item;
        suggestionsDiv.innerHTML="";
      };

      suggestionsDiv.appendChild(div);
    });
  }, 300);
});

// ================= SEARCH =================
function useSelectedSuggestion(){
  if(!selectedSuggestion){
    const first = document.querySelector(".suggestion-item");
    if(first) first.click();
    else return alert("No address found");
  }

  const lat = +selectedSuggestion.lat;
  const lon = +selectedSuggestion.lon;

  runSearch(lat, lon);
}

// ================= ZONE CHECK =================
function checkZones(lat, lon){
  const pt = turf.point([lon, lat]);
  let matches = [];

  ZONES.forEach(z => {
    if(!z.polygonObj) return;

    if(turf.booleanPointInPolygon(pt, z.polygonObj)){
      matches.push(z);
      z.layer.setStyle({color:'green', fillOpacity:0.2});
      highlightedZones.push(z.layer);
    }
  });

  return matches;
}

// ================= MAIN =================
function runSearch(lat, lon){
  clearMarkers();

  currentLat = lat;
  currentLon = lon;

  userMarker = L.marker([lat, lon], { draggable:true }).addTo(map);

  userMarker.on("dragend", () => {
    const pos = userMarker.getLatLng();
    currentLat = pos.lat;
    currentLon = pos.lng;
  });

  map.setView([lat, lon], 15);

  const resultDiv = document.getElementById("result");

  resultDiv.innerHTML = `
    <div style="background:#fff;padding:10px;border-radius:6px;margin-bottom:10px;">
      <b>Check placement of the house icon.</b><br>
      Zoom in if needed.<br><br>

      <button onclick="confirmLocation()">Check this location</button>
      <button onclick="location.reload()" style="background:#6c757d;margin-left:5px;">Try Again</button>

      <p style="font-size:13px;margin-top:8px;">
        Drag the house icon if needed.
      </p>
    </div>
  `;
}

// ================= CONFIRM =================
function confirmLocation(){
  clearMarkers();

  const lat = currentLat;
  const lon = currentLon;

  userMarker = L.marker([lat, lon], { draggable:true }).addTo(map);

  const matches = checkZones(lat, lon);
  const resultDiv = document.getElementById("result");

  if(matches.length === 0){
    resultDiv.innerHTML += "<p>❌ No matching zones found</p>";
    return;
  }

  resultDiv.innerHTML += `<p>✅ Found ${matches.length} zone(s)</p>`;

  matches.forEach(z => {
    const pt = parsePoint(z.location.point);
    if(!pt) return;

    const [lon2, lat2] = pt.geometry.coordinates;

    const m = L.marker([lat2, lon2]).addTo(map);
    locationMarkers.push(m);

    // Add Google Maps directions link
    resultDiv.innerHTML += `
      <div class="location-card">
        <b>${z.location.name}</b><br>
        ${z.location.address}<br>
        Grades: ${z.location.grades}<br>
        Zone: ${z.name}<br>
        <a href="https://www.google.com/maps/dir/?api=1&origin=${lat},${lon}&destination=${lat2},${lon2}" target="_blank">
          Get Directions
        </a>
      </div>
    `;
  });

  // Fit map to markers
  if(locationMarkers.length) map.fitBounds(locationMarkers.map(m => m.getLatLng()));
}
</script>

</body>
</html>
