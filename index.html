<!DOCTYPE html>
<html>
<head>
  <title>Zone Finder - Colorado</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { font-family: Arial; margin:0; padding:0; display:flex; height:100vh; }
    #sidebar { width: 320px; overflow-y:auto; padding:15px; border-right:1px solid #aaa; background:#f4f6f8; box-shadow: 2px 0px 5px rgba(0,0,0,0.1); }
    #map { flex:1; border-left:1px solid #ccc; }
    input { width: 90%; padding:7px; margin-bottom:5px; border-radius:4px; border:1px solid #ccc; }
    button { padding:6px 10px; border-radius:4px; border:none; background:#007bff; color:#fff; cursor:pointer; }
    button:hover { background:#0056b3; }
    .location-card { margin-bottom:12px; padding:10px; border-radius:6px; background:#fff; box-shadow: 0px 1px 3px rgba(0,0,0,0.1); }
    .location-card a { color: #007bff; text-decoration:none; }
    .location-card a:hover { text-decoration: underline; }

    #suggestions { 
      background:#fff; 
      border:1px solid #ccc; 
      position:absolute; 
      z-index:1000; 
      width: 280px;
      max-height:150px; 
      overflow-y:auto; 
      border-radius:4px; 
    }

    .suggestion-item { padding:5px; cursor:pointer; }
    .suggestion-item:hover, .suggestion-active { background:#007bff; color:#fff; }
  </style>
</head>
<body>

<div id="sidebar">
  <h2>Find Your Zone</h2>
  <input id="address" placeholder="Enter your address" autocomplete="off" />
  <div id="suggestions"></div>
  <button onclick="useSelectedSuggestion()">Search</button>
  <div id="result"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf/turf.min.js"></script>
<script src="data.js"></script>

<script>
// Map
const map = L.map('map').setView([39.0, -105.5], 7);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  subdomains:'abcd',
  attribution: '&copy; OpenStreetMap & CARTO'
}).addTo(map);

let userMarker;
let locationMarkers = [];
let highlightedZones = [];

// WKT parsers
function parsePoint(wkt) {
  const coords = wkt.match(/\(([^)]+)\)/)[1].split(" ");
  return turf.point([parseFloat(coords[0]), parseFloat(coords[1])]);
}
function parsePolygon(wkt) {
  const coords = wkt.match(/\(\(([^)]+)\)\)/)[1]
    .split(",")
    .map(pair => pair.trim().split(" ").map(Number));
  return turf.polygon([coords]);
}

// Draw zones
ZONES.forEach(zone => {
  const poly = parsePolygon(zone.polygon);
  const layer = L.geoJSON(poly, { color: 'blue', weight:2, fillOpacity:0.05 }).addTo(map);
  zone.layer = layer;
});

function clearMarkers() {
  if(userMarker) map.removeLayer(userMarker);
  locationMarkers.forEach(m => map.removeLayer(m));
  locationMarkers = [];
  highlightedZones.forEach(h => h.setStyle({color:'blue', fillOpacity:0.05}));
  highlightedZones = [];
}

// Autocomplete (FIXED + DEBOUNCED)
const addressInput = document.getElementById("address");
const suggestionsDiv = document.getElementById("suggestions");
let selectedSuggestion = null;
let currentFocus = -1;
let debounceTimer;

addressInput.addEventListener("keyup", function() {
  clearTimeout(debounceTimer);

  debounceTimer = setTimeout(async () => {
    const query = addressInput.value.trim().toLowerCase();
    if(!query) { suggestionsDiv.innerHTML=""; return; }

    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&viewbox=-109.06,41.0,-102.04,36.99&bounded=1&limit=5`
    );

    const data = await res.json();

    suggestionsDiv.innerHTML = "";

    data.forEach((item,index) => {
      const div = document.createElement("div");
      div.className="suggestion-item";
      div.innerText = item.display_name;

      div.onclick = () => {
        addressInput.value = item.display_name;
        selectedSuggestion = item;
        suggestionsDiv.innerHTML = "";
      };

      suggestionsDiv.appendChild(div);
    });

  }, 300);
});

// Hide dropdown
document.addEventListener("click", function(e){
  if(!addressInput.contains(e.target) && !suggestionsDiv.contains(e.target)){
    suggestionsDiv.innerHTML="";
  }
});

// Keyboard nav
addressInput.addEventListener("keydown", function(e){
  const items = suggestionsDiv.getElementsByClassName("suggestion-item");
  if(!items.length) return;

  if(e.key === "ArrowDown") { currentFocus++; addActive(items); }
  else if(e.key === "ArrowUp") { currentFocus--; addActive(items); }
  else if(e.key === "Enter") { e.preventDefault(); if(currentFocus>-1) items[currentFocus].click(); }
});

function addActive(items){
  removeActive(items);
  if(currentFocus >= items.length) currentFocus=0;
  if(currentFocus < 0) currentFocus=items.length-1;
  items[currentFocus].classList.add("suggestion-active");
}
function removeActive(items){
  for(let i=0;i<items.length;i++) items[i].classList.remove("suggestion-active");
}

function useSelectedSuggestion(){
  if(!selectedSuggestion){ alert("Please select from dropdown."); return; }
  const lat = parseFloat(selectedSuggestion.lat);
  const lon = parseFloat(selectedSuggestion.lon);
  runSearch(lat, lon);
}

// Main logic
function runSearch(lat, lon){
  clearMarkers();
  const userPoint = turf.point([lon, lat]);

  userMarker = L.marker([lat, lon]).addTo(map).bindPopup("You are here").openPopup();

  let matchedZones = [];

  ZONES.forEach(zone => {
    const polygon = parsePolygon(zone.polygon);
    if(turf.booleanPointInPolygon(userPoint, polygon)){
      matchedZones.push(zone);
      zone.layer.setStyle({color:'green', fillOpacity:0.2});
      highlightedZones.push(zone.layer);
    }
  });

  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "";

  if(matchedZones.length === 0){
    resultDiv.innerText = "❌ No matching zones found";
    map.setView([lat, lon], 10);
    return;
  }

  resultDiv.innerHTML = `<p>✅ Found ${matchedZones.length} matching zone(s)</p>`;

  matchedZones.forEach(zone => {
    const loc = zone.location;
    const pt = parsePoint(loc.point);
    const coords = pt.geometry.coordinates;

    const marker = L.marker([coords[1], coords[0]]).addTo(map);
    marker.bindPopup(`<b>${loc.name}</b><br>${loc.address}`);
    locationMarkers.push(marker);

    const div = document.createElement("div");
    div.className = "location-card";
    div.innerHTML = `
      <b>${loc.name}</b><br>
      ${loc.address}<br>
      Grades Served: ${loc.grades}<br>
      Zone: ${zone.name}<br>
      <a href="https://www.google.com/maps/dir/?api=1&origin=${lat},${lon}&destination=${coords[1]},${coords[0]}" target="_blank">Get Directions</a>
    `;
    resultDiv.appendChild(div);
  });

  map.fitBounds(locationMarkers.map(m=>m.getLatLng()));
}
</script>

</body>
</html>
